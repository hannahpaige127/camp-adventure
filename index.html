<!DOCTYPE html>
<html>
<head>
<title>Camp Adventure</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #e8f0e5;
    text-align: center;
}

h1 {
    background: #31572c;
    color: white;
    padding: 25px;
}

.map {
    padding: 30px;
}

.camp {
    background: white;
    margin: 20px auto;
    padding: 20px;
    width: 250px;
    border-radius: 15px;
    box-shadow: 0px 3px 10px gray;
}

button {
    background: #588157;
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 16px;
}

button:hover {
    background: #344e41;
}

</style>

</head>

<body>

<h1>🏕️ Camp Adventure Quest</h1>

<div class="map">

<div class="camp">
<h2>🔥 Campfire Circle</h2>
<p>Welcome to the adventure!</p>
<button onclick="alert('You found your first campsite!')">
Enter
</button>
</div>


<div class="camp">
<h2>🌲 Forest Trail</h2>
<p>Complete your next challenge.</p>
<button onclick="alert('Challenge unlocked!')">
Explore
</button>
</div>


<div class="camp">
<h2>⛰️ Mountain Summit</h2>
<p>You made it!</p>
<button onclick="alert('You earned your Ranger Badge!')">
Finish
</button>
</div>

</div>

</body>
</html>
